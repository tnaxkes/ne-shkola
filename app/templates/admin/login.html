<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Вход — Админ-панель</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm" style="width:380px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-music-note-beamed text-primary" style="font-size:2.5rem"></i>
        <h4 class="mt-2 fw-bold">Не Школа Барабанов</h4>
        <p class="text-muted small">Панель администратора</p>
      </div>
      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <div class="mb-3">
          <label class="form-label">Логин</label>
          <input type="text" name="username" class="form-control" placeholder="admin" autofocus required/>
        </div>
        <div class="mb-4">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
